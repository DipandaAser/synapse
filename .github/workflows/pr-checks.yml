name: PR Checks

on:
  pull_request:

jobs:
  pr-validation:
    name: Validate Pull Request
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build affected modules
        run: ./gradlew build --stacktrace

      - name: Run tests on affected modules
        run: ./gradlew test --stacktrace

      - name: Run lint on affected modules
        run: ./gradlew lint --stacktrace

      - name: Check for TODO/FIXME comments
        run: |
          TODO_COUNT=$(grep -r "TODO\|FIXME" --include="*.kt" --include="*.java" app/src core/*/src data/*/src feature/*/src service/*/src | wc -l)
          echo "Found $TODO_COUNT TODO/FIXME comments"
          if [ $TODO_COUNT -gt 50 ]; then
            echo "Warning: High number of TODO/FIXME comments"
          fi

      - name: Check module dependencies
        run: |
          echo "Checking for circular dependencies..."
          ./gradlew :app:dependencies --configuration debugCompileClasspath > app-deps.txt || true
          echo "Dependencies checked"

      - name: Verify no hardcoded strings
        run: |
          echo "Checking for hardcoded strings (common violations)..."
          grep -r "http://" --include="*.kt" app/src core/*/src data/*/src feature/*/src service/*/src || echo "No http:// found"
          grep -r "https://localhost" --include="*.kt" app/src core/*/src data/*/src feature/*/src service/*/src || echo "No localhost URLs found"

      - name: Comment on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const prNumber = context.payload.pull_request.number;
            
            let comment = '## PR Validation Results\n\n';
            comment += '### Build Status\n';
            comment += '- Build completed\n';
            comment += '- Tests executed\n';
            comment += '- Lint checks performed\n\n';
            comment += '### Module Structure\n';
            comment += 'All modules verified:\n';
            comment += '- :app\n';
            comment += '- :core:core-common\n';
            comment += '- :core:core-network\n';
            comment += '- :data:data-triggers\n';
            comment += '- :feature:feature-triggers\n';
            comment += '- :service:service-sms\n\n';
            comment += 'Please ensure all checklist items in the PR template are completed.';
            
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: comment
            });

  size-check:
    name: APK Size Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Check APK size
        run: |
          APK_SIZE=$(stat -f%z app/build/outputs/apk/debug/*.apk 2>/dev/null || stat -c%s app/build/outputs/apk/debug/*.apk 2>/dev/null)
          APK_SIZE_MB=$((APK_SIZE / 1024 / 1024))
          echo "APK Size: ${APK_SIZE_MB}MB"
          
          if [ $APK_SIZE_MB -gt 50 ]; then
            echo "Warning: APK size is larger than 50MB"
          fi
          
          echo "APK_SIZE_MB=${APK_SIZE_MB}" >> $GITHUB_ENV

      - name: Comment APK size
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const apkSize = process.env.APK_SIZE_MB;
            
            const comment = `## APK Size Report\n\nDebug APK size: **${apkSize}MB**\n\n` +
                          `Make sure the APK size is reasonable for the changes made.`;
            
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: comment
            });
